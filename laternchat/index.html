<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LaternChat</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>LaternChat</h2>
            </div>
            <div class="model-select-container">
                <label for="model-name">Model</label>
                <select id="model-name">
                    <option value="meta/llama-3.1-8b-instruct" selected>Llama 3.1 8B (Fast)</option>
                    <option value="meta/llama-3.1-70b-instruct">Llama 3.1 70B</option>
                    <option value="meta/llama-3.1-405b-instruct">Llama 3.1 405B</option>
                    <option value="nvidia/llama-3.1-nemotron-70b-instruct">Nemotron 70B</option>
                    <option value="mistralai/mixtral-8x22b-instruct-v0.1">Mixtral 8x22B</option>
                </select>
            </div>
            
            <button id="new-chat-btn" class="new-chat-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                New Chat
            </button>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-area">
            <div class="chat-header">
                <h3>LaternChat AI</h3>
            </div>
            
            <div class="chat-messages" id="chat-messages">
                <div class="message assistant welcome-message">
                    <div class="avatar assistant-avatar">AI</div>
                    <div class="message-content">
                        Welcome to Latern Tech. Ask me anything!
                    </div>
                </div>
            </div>

            <div class="chat-input-container">
                <div id="attachment-preview" class="attachment-preview hidden">
                    <span id="attachment-name"></span>
                    <button type="button" id="remove-attachment-btn">&times;</button>
                </div>
                <form id="chat-form" class="chat-form">
                    <button type="button" id="upload-btn" class="upload-btn" title="Attach file">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
                        </svg>
                    </button>
                    <input type="file" id="file-input" accept=".txt,.md,.csv,.pdf" hidden>
                    <textarea id="message-input" placeholder="Message LaternChat..." rows="1"></textarea>
                    <button type="submit" id="send-btn" disabled>
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M22 2L11 13M22 2L15 22L11 13M11 13L2 9L22 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </form>
                <div class="disclaimer">
                    AI can make mistakes. Consider verifying important information.
                </div>
            </div>
        </main>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
